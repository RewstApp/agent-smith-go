name: Lint

on: push

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v2.10.1
          args: --path-mode=abs
