name: Coverage

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  coverage:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"
          cache: true

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Create output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Path dist

      - name: Run test coverage
        shell: pwsh
        run: ./scripts/coverage.ps1
